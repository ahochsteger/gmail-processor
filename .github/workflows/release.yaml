name: Release Manager

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run"
        type: choice
        options:
          - preview
          - update-release
          - publish-release
          - force-major
          - force-minor
          - force-patch
        default: publish-release
      tag:
        description: "Release tag (e.g. v2.17.0)"
        type: string
        required: false
      pr:
        description: "PR number (for override)"
        type: string
        required: false
      gas_version:
        description: "GAS Lib Version override (e.g. 105)"
        type: string
        required: false
      environment:
        description: "Environment context"
        type: choice
        options:
          - beta
          - prod
        default: beta

env:
  ACT: false
  DEVBOX_QUIET: 1

jobs:
  release:
    uses: ./.github/workflows/_release-worker.yaml
    with:
      job: ${{ github.event.inputs.job }}
      environment: ${{ github.event.inputs.environment }}
      tag: ${{ github.event.inputs.tag }}
      pr: ${{ github.event.inputs.pr }}
      gas_version: ${{ github.event.inputs.gas_version }}
    secrets: inherit
