name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Select a workflow profile"
        type: choice
        default: "default"
        options:
          - "default"
          - "fast-qa"
          - "docs-only"
          - "tests-only"
          - "beta-deploy"
          - "release-dry"
          - "release-prod"
      skip_test:
        description: "Skip tests (override)"
        type: boolean
        default: false
      local_test:
        description: "Local test (skip QA/Release/Snyk)"
        type: boolean
        default: false
      dry_run:
        description: "Dry-run release override (Safe)"
        type: boolean
        default: false

jobs:
  qa:
    name: "QA & Beta Test"
    runs-on: ubuntu-latest
    environment:
      name: beta
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.create-draft-release.outputs.release_created }}
      tag_name: ${{ steps.create-draft-release.outputs.tag_name }}
      patch: ${{ steps.create-draft-release.outputs.patch }}
      # Profile Flags
      do_build_lib: ${{ steps.profile.outputs.do_build_lib }}
      do_build_docs: ${{ steps.profile.outputs.do_build_docs }}
      do_test: ${{ steps.profile.outputs.do_test }}
      do_qa: ${{ steps.profile.outputs.do_qa }}
      do_beta_deploy: ${{ steps.profile.outputs.do_beta_deploy }}
      do_release: ${{ steps.profile.outputs.do_release }}
      is_dry_run: ${{ steps.profile.outputs.is_dry_run }}
    env:
      DEVBOX_QUIET: 1
      DEVBOX_NO_LOG_PROGRESS: 1
      NIX_INSTALLER_NO_PROGRESS: 1
      NPM_CONFIG_PROGRESS: "false"
      CLASP_ACCESS_TOKEN: ${{secrets.CLASP_ACCESS_TOKEN}}
      CLASP_CLIENT_ID: ${{secrets.CLASP_CLIENT_ID}}
      CLASP_CLIENT_SECRET: ${{secrets.CLASP_CLIENT_SECRET}}
      CLASP_EXAMPLES_DEPLOYMENT_ID: ${{secrets.CLASP_EXAMPLES_DEPLOYMENT_ID}}
      CLASP_EXAMPLES_SCRIPT_ID: ${{secrets.CLASP_EXAMPLES_SCRIPT_ID}}
      CLASP_ID_TOKEN: ${{secrets.CLASP_ID_TOKEN}}
      CLASP_LIB_DEPLOYMENT_ID: ${{secrets.CLASP_LIB_DEPLOYMENT_ID}}
      CLASP_LIB_SCRIPT_ID: ${{secrets.CLASP_LIB_SCRIPT_ID}}
      CLASP_REFRESH_TOKEN: ${{secrets.CLASP_REFRESH_TOKEN}}
      GCLOUD_PROJECT_ID: ${{secrets.GCLOUD_PROJECT_ID}}
      GCLOUD_PROJECT_NR: ${{secrets.GCLOUD_PROJECT_NR}}
    steps:
      - id: profile
        name: Map Workflow Profile
        shell: bash
        run: |
          # Default Values
          DO_BUILD_LIB=true
          DO_BUILD_DOCS=true
          DO_TEST=true
          DO_QA=true
          DO_BETA_DEPLOY=false
          DO_RELEASE=false
          IS_DRY_RUN="${{ inputs.dry_run || 'false' }}"
          IS_LOCAL_TEST="false"

          if [[ "${{ inputs.local_test }}" == "true" || "${{ env.ACT }}" == "true" ]]; then
            IS_LOCAL_TEST="true"
          fi

          # Automated triggers (Push to main) should deploy to beta by default
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            DO_BETA_DEPLOY=true
          fi

          # Handle Profiles
          case "${{ inputs.run_mode || 'default' }}" in
            fast-qa)
              DO_BUILD_DOCS=false
              DO_QA=false
              ;;
            docs-only)
              DO_BUILD_LIB=false
              DO_TEST=false
              DO_QA=false
              ;;
            tests-only)
              DO_BUILD_DOCS=false
              DO_QA=false
              ;;
            beta-deploy)
              DO_BETA_DEPLOY=true
              ;;
            release-dry)
              DO_RELEASE=true
              IS_DRY_RUN=true
              ;;
            release-prod)
              DO_RELEASE=true
              IS_DRY_RUN=false
              ;;
          esac

          # Local Test Adjustments
          if [[ "${IS_LOCAL_TEST}" == "true" ]]; then
            DO_QA=false
            DO_RELEASE=false
            DO_BETA_DEPLOY=false
          fi

          # Force Overrides
          if [[ "${{ inputs.skip_test }}" == "true" ]]; then DO_TEST=false; fi

          # Output Mapping
          {
            echo "do_build_lib=${DO_BUILD_LIB}"
            echo "do_build_docs=${DO_BUILD_DOCS}"
            echo "do_test=${DO_TEST}"
            echo "do_qa=${DO_QA}"
            echo "do_beta_deploy=${DO_BETA_DEPLOY}"
            echo "do_release=${DO_RELEASE}"
            echo "is_dry_run=${IS_DRY_RUN}"
          } >> "$GITHUB_OUTPUT"

          # Summary for Logs
          echo "::group::Workflow Profile: ${{ inputs.run_mode || 'automated' }}"
          echo "Build Lib: ${DO_BUILD_LIB}"
          echo "Build Docs: ${DO_BUILD_DOCS}"
          echo "Run Tests: ${DO_TEST}"
          echo "Run QA: ${DO_QA}"
          echo "Deploy Beta: ${DO_BETA_DEPLOY}"
          echo "Process Release: ${DO_RELEASE}"
          echo "Dry Run: ${IS_DRY_RUN}"
          echo "::endgroup::"

      - id: checkout
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - id: setup-env
        name: Setup Environment
        uses: ./.github/actions/setup-environment
      - id: create-draft-release
        name: Create Draft Release
        if: ${{ github.event_name != 'pull_request' && (steps.profile.outputs.do_release == 'true') }}
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
      - id: build-lib
        if: ${{ steps.profile.outputs.do_build_lib == 'true' || steps.profile.outputs.do_beta_deploy == 'true' }}
        name: Build lib and examples
        run: devbox run npm run ci:build
      - id: maintenance-check
        name: Maintenance Check (PRs)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          devbox run npm run all:update
          devbox run npm run lint-fix
          if [ -n "$(git status --porcelain)" ]; then
            if [ "${ACT}" == "true" ]; then
              echo "::warning::Maintenance check reported drift, but skipping failure in local 'act' run."
            else
              echo "::error::Maintenance check failed: The generated artifacts (docs, examples, schema, etc.) are out of sync or formatting is incorrect."
              echo "To fix this locally, run: npm run all:pre-commit"
              EXIT_CODE=1
            fi
            echo "::group::Git Status"
            git status --porcelain
            echo "::endgroup::"
            echo "::group::Git Diff"
            git --no-pager diff
            echo "::endgroup::"
            exit ${EXIT_CODE:-0}
          fi
      - id: test
        if: ${{ steps.profile.outputs.do_test == 'true' }}
        name: Test
        run: devbox run npm run ci:test
      - id: build-docs
        if: ${{ steps.profile.outputs.do_build_docs == 'true' }}
        name: Build docs
        run: devbox run npm run ci:docs
      - id: qa-coveralls
        if: ${{ steps.profile.outputs.do_qa == 'true' }}
        name: QA Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2
      - id: qa-sonarqube
        if: ${{ steps.profile.outputs.do_qa == 'true' }}
        name: QA SonarQube
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - id: deploy-lib-beta
        if: ${{ steps.profile.outputs.do_beta_deploy == 'true' }}
        name: Deploy Lib (Beta)
        run: |
          if [ -z "${CLASP_LIB_SCRIPT_ID}" ]; then
            echo "::warning::CLASP_LIB_SCRIPT_ID is empty. Skipping push."
            exit 0
          fi
          npm run push:lib
      - id: deploy-examples-beta
        if: ${{ steps.profile.outputs.do_beta_deploy == 'true' }}
        name: Deploy Examples (Beta)
        run: |
          if [ -z "${CLASP_EXAMPLES_SCRIPT_ID}" ]; then
            echo "::warning::CLASP_EXAMPLES_SCRIPT_ID is empty. Skipping push."
            exit 0
          fi
          npm run push:examples

  release:
    name: "Production Release"
    needs: qa
    # Use outputs from qa job
    if: ${{ github.event_name != 'pull_request' && (needs.qa.outputs.release_created == 'true' || needs.qa.outputs.do_release == 'true') }}
    runs-on: ubuntu-latest
    environment:
      name: prod
    permissions:
      contents: write
      pull-requests: write
    env:
      CLASP_ACCESS_TOKEN: ${{secrets.CLASP_ACCESS_TOKEN}}
      CLASP_CLIENT_ID: ${{secrets.CLASP_CLIENT_ID}}
      CLASP_CLIENT_SECRET: ${{secrets.CLASP_CLIENT_SECRET}}
      CLASP_EXAMPLES_DEPLOYMENT_ID: ${{secrets.CLASP_EXAMPLES_DEPLOYMENT_ID}}
      CLASP_EXAMPLES_SCRIPT_ID: ${{secrets.CLASP_EXAMPLES_SCRIPT_ID}}
      CLASP_ID_TOKEN: ${{secrets.CLASP_ID_TOKEN}}
      CLASP_LIB_DEPLOYMENT_ID: ${{secrets.CLASP_LIB_DEPLOYMENT_ID}}
      CLASP_LIB_SCRIPT_ID: ${{secrets.CLASP_LIB_SCRIPT_ID}}
      CLASP_REFRESH_TOKEN: ${{secrets.CLASP_REFRESH_TOKEN}}
      GCLOUD_PROJECT_ID: ${{secrets.GCLOUD_PROJECT_ID}}
      GCLOUD_PROJECT_NR: ${{secrets.GCLOUD_PROJECT_NR}}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - id: setup-env
        name: Setup Environment
        uses: ./.github/actions/setup-environment
      - id: deploy-lib-release
        if: ${{ needs.qa.outputs.release_created == 'true' || (needs.qa.outputs.do_release == 'true' && needs.qa.outputs.is_dry_run == 'false') }}
        name: Deploy Lib (Release)
        run: npm run deploy
        env:
          CLASP_DEPLOYMENT_NAME: ${{ needs.qa.outputs.tag_name }}
      - id: update-release-notes
        if: ${{ needs.qa.outputs.do_release == 'true' }}
        name: Update Draft Release Notes
        run: |
          if [ "${{ needs.qa.outputs.is_dry_run }}" == "true" ]; then
             npm run release:preview -- "${{ needs.qa.outputs.tag_name || 'latest' }}"
          else
             npm run release:update -- "${{ needs.qa.outputs.tag_name || 'latest' }}"
          fi
        env:
          CLASP_DEPLOYMENT_NAME: ${{ needs.qa.outputs.tag_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - id: auto-publish-patch
        if: ${{ needs.qa.outputs.release_created == 'true' && needs.qa.outputs.patch != '0' && needs.qa.outputs.is_dry_run == 'false' }}
        name: Auto-publish Patch Release
        run: |
          npm run release:publish -- "${{ needs.qa.outputs.tag_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - id: deploy-docs
        if: ${{ needs.qa.outputs.do_build_docs == 'true' && (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        name: Deploy docs
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          folder: docs/build
