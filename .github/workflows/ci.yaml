name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Select a workflow profile"
        type: choice
        default: "default"
        options:
          - "default"
          - "fast-qa"
          - "docs-only"
          - "tests-only"
          - "beta-deploy"
          - "release-dry"
          - "release-prod"
      skip_test:
        description: "Skip tests (override)"
        type: boolean
        default: false
      local_test:
        description: "Local test (skip QA/Release/Snyk)"
        type: boolean
        default: false
      dry_run:
        description: "Dry-run release override (Safe)"
        type: boolean
        default: false
      enable_maintenance_fix:
        description: "Enable automated maintenance auto-fix (DANGEROUS)"
        type: boolean
        default: false

env:
  ACT: false
  DEVBOX_NO_LOG_PROGRESS: 1
  NIX_CONFIG: "quiet = true"
  NIX_INSTALLER_NO_PROGRESS: 1
  NPM_CONFIG_PROGRESS: "false"

jobs:
  ci:
    name: "QA & Beta Test"
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment:
      name: beta
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.create-draft-release.outputs.release_created }}
      tag_name: ${{ steps.create-draft-release.outputs.tag_name }}
      patch: ${{ steps.create-draft-release.outputs.patch }}
      release_pr: ${{ steps.create-draft-release.outputs.pr }}
      # Profile Flags
      enable_build_lib: ${{ steps.profile.outputs.enable_build_lib }}
      enable_build_docs: ${{ steps.profile.outputs.enable_build_docs }}
      enable_test: ${{ steps.profile.outputs.enable_test }}
      enable_qa: ${{ steps.profile.outputs.enable_qa }}
      enable_beta_deploy: ${{ steps.profile.outputs.enable_beta_deploy }}
      enable_prod_deploy: ${{ steps.profile.outputs.enable_prod_deploy }}
      enable_release_please: ${{ steps.profile.outputs.enable_release_please }}
      release_dry_run: ${{ steps.profile.outputs.release_dry_run }}
      enable_maintenance_fix: ${{ steps.profile.outputs.enable_maintenance_fix }}
    # Environment secrets are now centralized in _release-worker.yaml
    # They are only mapped here if explicitly needed by a local step.
    steps:
      - id: profile
        name: Map Workflow Profile
        shell: bash
        run: |
          # Default Values
          ENABLE_BUILD_LIB=true
          ENABLE_BUILD_DOCS=true
          ENABLE_TEST=true
          ENABLE_QA=true
          ENABLE_BETA_DEPLOY=false
          ENABLE_PROD_DEPLOY=false
          ENABLE_RELEASE_PLEASE=false
          RELEASE_DRY_RUN="${{ inputs.dry_run || 'false' }}"
          IS_LOCAL_TEST="false"

          if [[ "${{ inputs.local_test }}" == "true" || "${{ env.ACT }}" == "true" ]]; then
            IS_LOCAL_TEST="true"
          fi

          # Automated triggers (Push to main) should deploy to beta by default
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENABLE_BETA_DEPLOY=true
            ENABLE_RELEASE_PLEASE=true
          fi

          # Handle Profiles
          case "${{ inputs.run_mode || 'default' }}" in
            fast-qa)
              ENABLE_BUILD_DOCS=false
              ENABLE_QA=false
              ;;
            docs-only)
              ENABLE_BUILD_LIB=false
              ENABLE_TEST=false
              ENABLE_QA=false
              ;;
            tests-only)
              ENABLE_BUILD_DOCS=false
              ENABLE_QA=false
              ;;
            beta-deploy)
              ENABLE_BETA_DEPLOY=true
              ;;
            release-dry)
              ENABLE_RELEASE_PLEASE=true
              RELEASE_DRY_RUN=true
              ;;
            release-prod)
              ENABLE_RELEASE_PLEASE=true
              ENABLE_PROD_DEPLOY=true
              RELEASE_DRY_RUN=false
              ;;
          esac

          # Local Test Adjustments
          if [[ "${IS_LOCAL_TEST}" == "true" ]]; then
            ENABLE_QA=false
            ENABLE_RELEASE_PLEASE=false
            ENABLE_BETA_DEPLOY=false
            ENABLE_PROD_DEPLOY=false
          fi

          # Force Overrides
          if [[ "${{ inputs.skip_test }}" == "true" ]]; then ENABLE_TEST=false; fi

          # Output Mapping
          {
            echo "enable_build_lib=${ENABLE_BUILD_LIB}"
            echo "enable_build_docs=${ENABLE_BUILD_DOCS}"
            echo "enable_test=${ENABLE_TEST}"
            echo "enable_qa=${ENABLE_QA}"
            echo "enable_beta_deploy=${ENABLE_BETA_DEPLOY}"
            echo "enable_prod_deploy=${ENABLE_PROD_DEPLOY}"
            echo "enable_release_please=${ENABLE_RELEASE_PLEASE}"
            echo "release_dry_run=${RELEASE_DRY_RUN}"
            echo "enable_maintenance_fix=${{ inputs.enable_maintenance_fix || 'false' }}"
          } >> "$GITHUB_OUTPUT"

          # Summary for Logs
          echo "::group::Workflow Profile: ${{ inputs.run_mode || 'automated' }}"
          echo "Build Lib: ${ENABLE_BUILD_LIB}"
          echo "Build Docs: ${ENABLE_BUILD_DOCS}"
          echo "Run Tests: ${ENABLE_TEST}"
          echo "Run QA: ${ENABLE_QA}"
          echo "Deploy Beta: ${ENABLE_BETA_DEPLOY}"
          echo "Deploy Prod: ${ENABLE_PROD_DEPLOY}"
          echo "Enable Release-Please: ${ENABLE_RELEASE_PLEASE}"
          echo "Release Dry-Run: ${RELEASE_DRY_RUN}"
          echo "::endgroup::"

      - id: checkout
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - id: setup-env
        name: Setup Environment
        uses: ./.github/actions/setup-environment
      - id: maintenance-verify
        name: Verify Maintenance Scripts
        run: devbox --quiet run npm run all:maintenance
      - id: create-draft-release
        name: Create Draft Release
        if: ${{ github.event_name != 'pull_request' && (steps.profile.outputs.enable_release_please == 'true') }}
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
      - id: build-lib
        if: ${{ steps.profile.outputs.enable_build_lib == 'true' || steps.profile.outputs.enable_beta_deploy == 'true' }}
        name: Build lib and examples
        run: devbox --quiet run npm run ci:build
      - name: Upload GAS artifacts
        if: ${{ env.ACT != 'true' && (steps.profile.outputs.enable_build_lib == 'true' || steps.profile.outputs.enable_beta_deploy == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: gas-artifacts
          path: build/gas
      - id: maintenance-fix
        name: Maintenance Auto-Fix (PRs)
        if: ${{ steps.profile.outputs.enable_maintenance_fix == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          devbox --quiet run npm run all:update
          devbox --quiet run npm run lint-fix
          if [ -n "$(git status --porcelain)" ]; then
            if [ "${ACT}" == "true" ]; then
              echo "::warning::Maintenance drift detected, but skipping auto-commit in local 'act' run."
              git status --porcelain
              git --no-pager diff
            else
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add .
              git commit -m "chore(ci): auto-sync maintenance artifacts [skip ci]"
              git push origin HEAD:refs/heads/"$HEAD_REF"
              echo "::notice::Maintenance drift detected and automatically fixed via auto-commit."
            fi
          fi
      - id: audit-security
        if: ${{ steps.profile.outputs.enable_qa == 'true' }}
        name: Audit Security
        run: devbox --quiet run npm run all:audit-security
      - id: test
        if: ${{ steps.profile.outputs.enable_test == 'true' }}
        name: Test
        run: devbox --quiet run npm run ci:test
      - id: build-docs
        if: ${{ steps.profile.outputs.enable_build_docs == 'true' }}
        name: Build docs
        run: devbox --quiet run npm run ci:docs
      - name: Upload Docs artifacts
        if: ${{ env.ACT != 'true' && steps.profile.outputs.enable_build_docs == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: docs-artifacts
          path: docs/build
      - id: qa-coveralls
        if: ${{ steps.profile.outputs.enable_qa == 'true' }}
        name: QA Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2
      - id: qa-sonarqube
        if: ${{ steps.profile.outputs.enable_qa == 'true' }}
        name: QA SonarQube
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - id: auto-contributors
        name: Auto-add Missing Contributors
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          USERS=""
          OUTPUT=$(devbox --quiet run npx all-contributors-cli check || true)
          if echo "$OUTPUT" | grep -q "Missing contributors in .all-contributorsrc:"; then
            MISSING_LINE=$(echo "$OUTPUT" | grep -A 1 "Missing contributors in .all-contributorsrc:" | tail -n 1)
            IFS=',' read -r -a array <<< "$MISSING_LINE"
            for user in "${array[@]}"; do
              user=$(echo "$user" | xargs)
              if [[ ! "$user" =~ \[bot\] ]] && [[ "$user" != *"-bot"* ]] && [[ "$user" != *"bot-"* ]] && [[ "$user" != "dependabot" ]]; then
                USERS="$USERS $user"
              fi
            done
          fi
          if [ -n "$USERS" ]; then
            for user in $USERS; do
              devbox --quiet run npx all-contributors-cli add "$user" code || true
            done
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add README.md .all-contributorsrc
            git commit -m "docs: add missing contributors [skip ci]" || echo "No changes to commit"
            git push
          fi

  beta-deploy:
    name: "Beta Deployment"
    needs: ci
    if: ${{ github.event_name != 'pull_request' && needs.ci.outputs.enable_beta_deploy == 'true' }}
    uses: ./.github/workflows/_release-worker.yaml
    with:
      job: beta-deploy
      environment: beta
    secrets: inherit

  release:
    name: "Production Release"
    needs: ci
    if: ${{ github.event_name != 'pull_request' && (needs.ci.outputs.release_created == 'true' || needs.ci.outputs.enable_prod_deploy == 'true') }}
    uses: ./.github/workflows/_release-worker.yaml
    with:
      job: ci-release
      environment: prod
      tag: ${{ needs.ci.outputs.tag_name }}
      release_created: ${{ needs.ci.outputs.release_created == 'true' }}
      patch_count: ${{ needs.ci.outputs.patch }}
      is_dry_run: ${{ needs.ci.outputs.release_dry_run == 'true' }}
      enable_release_please: ${{ needs.ci.outputs.enable_release_please == 'true' }}
      enable_build_docs: ${{ needs.ci.outputs.enable_build_docs == 'true' }}
    secrets: inherit

  enrich-release:
    name: "Enrich Release Notes"
    needs: ci
    if: ${{ github.event_name != 'pull_request' && needs.ci.outputs.enable_release_please == 'true' && needs.ci.outputs.release_pr != '' && needs.ci.outputs.release_pr != 'null' && needs.ci.outputs.release_created != 'true' }}
    uses: ./.github/workflows/_release-worker.yaml
    with:
      job: update-release
      environment: prod
      pr: ${{ fromJSON(needs.ci.outputs.release_pr).number }}
    secrets: inherit
