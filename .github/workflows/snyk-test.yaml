name: snyk-test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      enable_snyk:
        description: "Enable Snyk security scan"
        type: boolean
        default: false

env:
  ACT: false
  DEVBOX_QUIET: 1

jobs:
  snyk-scan:
    if: inputs.enable_snyk == true && github.actor != 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Setup Environment
        uses: ./.github/actions/setup-environment
      - name: Snyk Test (lib)
        if: env.ACT != 'true'
        continue-on-error: true
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
      - name: Snyk Test (docs)
        if: env.ACT != 'true'
        continue-on-error: true
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=docs/package.json
