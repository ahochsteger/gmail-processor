name: Release Worker

on:
  workflow_call:
    inputs:
      job:
        description: "Job to run (preview, update, publish, deploy, force-*, ci-release)"
        required: true
        type: string
      environment:
        description: "Execution environment (beta, prod)"
        required: true
        type: string
      tag:
        description: "Release tag"
        required: false
        type: string
      pr:
        description: "PR number override"
        required: false
        type: string
      gas_version:
        description: "GAS Lib Version override"
        required: false
        type: string
      # Automated release flags (from CI)
      release_created:
        required: false
        type: boolean
        default: false
      patch_count:
        required: false
        type: string
        default: "0"
      is_dry_run:
        required: false
        type: boolean
        default: false
      enable_release_please:
        required: false
        type: boolean
        default: false
      enable_build_docs:
        required: false
        type: boolean
        default: false

env:
  ACT: false
  DEVBOX_NO_LOG_PROGRESS: 1
  NIX_CONFIG: "quiet = true"

jobs:
  run:
    name: "${{ inputs.job }} (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    permissions:
      contents: write
      pull-requests: write
      discussions: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CLASP_ACCESS_TOKEN: ${{ secrets.CLASP_ACCESS_TOKEN }}
      CLASP_CLIENT_ID: ${{ secrets.CLASP_CLIENT_ID }}
      CLASP_CLIENT_SECRET: ${{ secrets.CLASP_CLIENT_SECRET }}
      CLASP_EXAMPLES_DEPLOYMENT_ID: ${{ secrets.CLASP_EXAMPLES_DEPLOYMENT_ID }}
      CLASP_EXAMPLES_SCRIPT_ID: ${{ secrets.CLASP_EXAMPLES_SCRIPT_ID }}
      CLASP_ID_TOKEN: ${{ secrets.CLASP_ID_TOKEN }}
      CLASP_LIB_DEPLOYMENT_ID: ${{ secrets.CLASP_LIB_DEPLOYMENT_ID }}
      CLASP_LIB_SCRIPT_ID: ${{ secrets.CLASP_LIB_SCRIPT_ID }}
      CLASP_REFRESH_TOKEN: ${{ secrets.CLASP_REFRESH_TOKEN }}
      GCLOUD_PROJECT_ID: ${{ secrets.GCLOUD_PROJECT_ID }}
      GCLOUD_PROJECT_NR: ${{ secrets.GCLOUD_PROJECT_NR }}
      CLASP_DEPLOYMENT_NAME: ${{ inputs.tag }}
      GAS_LIB_VERSION: ${{ inputs.gas_version }}
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - id: setup-env
        name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Download GAS artifacts
        if: ${{ env.ACT != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: gas-artifacts
          path: build/gas
        continue-on-error: true

      - name: Download Docs artifacts
        if: ${{ env.ACT != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: docs-artifacts
          path: docs/build
        continue-on-error: true

      # --- Maintenance & Support ---

      - id: sync-gas-version
        name: Synchronize GAS Version
        if: ${{ !startsWith(inputs.job, 'force-') && (inputs.job != 'ci-release' || !inputs.release_created) }}
        run: |
          devbox --quiet run npm run release:info

      - id: force-release
        name: Force Release Trigger
        if: ${{ startsWith(inputs.job, 'force-') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          devbox --quiet run npm run release:${{ inputs.job }}
          git push

      # --- Deployment ---

      - id: beta-deploy
        if: ${{ inputs.job == 'beta-deploy' }}
        name: Deploy Beta (Lib & Examples)
        run: |
          if [ ! -d "build/gas/lib" ]; then
            devbox --quiet run npm run ci:build
          fi
          devbox --quiet run npm run push:lib
          devbox --quiet run npm run push:examples

      - id: deploy-lib-release
        if: ${{ inputs.job == 'ci-release' && (inputs.release_created || (inputs.environment == 'prod' && !inputs.is_dry_run)) }}
        name: Deploy Lib (Release)
        run: |
          if [ ! -d "build/gas/lib" ]; then
            devbox --quiet run npm run ci:build
          fi
          devbox --quiet run npm run all:push
          devbox --quiet run npm run deploy
        env:
          CLASP_DEPLOYMENT_NAME: ${{ inputs.tag }}

      # --- Release Notes Management ---

      - id: preview-release-notes
        name: Preview Release Notes
        if: ${{ inputs.job == 'preview' }}
        run: |
          devbox --quiet run npm run release:preview -- ${{ inputs.pr && format('--pr {0}', inputs.pr) || '' }}

      - id: update-release-notes
        name: Update Release Notes
        if: ${{ inputs.job == 'update-release' || (inputs.job == 'ci-release' && inputs.enable_release_please) }}
        run: |
          if [ "${{ inputs.is_dry_run }}" == "true" ]; then
             devbox --quiet run npm run release:preview -- "${{ inputs.tag || 'latest' }}"
          else
             devbox --quiet run npm run release:update -- "${{ inputs.tag || 'latest' }}" ${{ inputs.pr && format('--pr {0}', inputs.pr) || '' }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: publish-release
        name: Publish Release
        if: ${{ inputs.job == 'publish-release' }}
        run: |
          devbox --quiet run npm run release:publish -- "${{ inputs.tag || 'latest' }}"

      # --- Documentation ---

      - id: build-docs
        if: ${{ inputs.job == 'ci-release' && inputs.enable_build_docs && github.ref == 'refs/heads/main' }}
        name: Build docs
        run: |
          if [ ! -d "docs/build" ]; then
            devbox --quiet run npm run ci:docs
          fi

      - id: deploy-docs
        if: ${{ inputs.job == 'ci-release' && inputs.enable_build_docs && github.ref == 'refs/heads/main' }}
        name: Deploy docs
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          folder: docs/build

      - id: upload-preview-artifact
        name: Upload Preview Artifact
        if: ${{ inputs.job == 'preview' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-notes-preview-${{ inputs.environment }}
          path: build/release-notes-*
